name: CI

# Analyze + format + unit tests on every push to main and every PR, plus a
# coverage gate and a compiled-binary smoke check. Live tests (real Filen
# backend) are tagged `live` and hard-skipped here — no account creds in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze + format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart --version
      - run: dart pub get
      - name: dart analyze (fatal infos)
        run: dart analyze --fatal-infos
      - name: dart format (no changes expected)
        run: dart format --output=none --set-exit-if-changed .

  test:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Run unit tests with coverage (live excluded)
        run: dart test --coverage=coverage --exclude-tags=live
      - name: Format coverage to lcov
        run: |
          dart run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json \
            --report-on=lib
      - name: Coverage gate (per-file thresholds)
        run: dart run tool/check_coverage.dart coverage/lcov.info

  # Native AES-GCM FFI bindings on Windows + macOS (Linux is covered by the
  # `test` job above, which runs aes_gcm_backend_test -> OpenSSL assertion).
  # aes_gcm_backend_test ASSERTS the OS binding loads + is byte-exact +
  # interoperable with Filen's pointycastle wire format (Windows->BCrypt,
  # macOS->OpenSSL if a Homebrew libcrypto is present). Headless, no app/device.
  crypto-native:
    name: Native crypto (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: analyze
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Native FFI AES-GCM tests (Windows -> BCrypt, macOS -> OpenSSL)
        run: dart test test/aes_gcm_backend_test.dart

  compile:
    name: Compile binary smoke check
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Compile binary
        run: dart compile exe bin/filen.dart -o /tmp/filen
      - name: Smoke check
        run: /tmp/filen help | head -5
