name: Release

# Triggered by pushing a version tag (e.g. v0.1.0), or manually via the
# Actions tab (workflow_dispatch) with a tag to release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Gate the release on the same checks CI enforces.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart test --exclude-tags=live

  # Cross-compile a self-contained binary for each platform.
  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: filen-linux-x64
          - os: macos-latest
            artifact: filen-macos-arm64
          - os: macos-13
            artifact: filen-macos-x64
          - os: windows-latest
            artifact: filen-windows-x64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - name: Compile binary
        run: |
          mkdir -p dist
          dart compile exe bin/filen.dart -o "dist/${{ matrix.artifact }}"
      - name: Smoke check
        run: "./dist/${{ matrix.artifact }} help"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  # Collect every binary, checksum them, and publish a GitHub Release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "Filen CLI $TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
