name: filen_client
description: Unofficial Dart client and CLI for Filen.io end-to-end-encrypted cloud storage — login, list, encrypted upload/download with batching and resume, plus a WebDAV bridge.
version: 0.2.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.2
  crypto: ^3.0.3
  http: ^1.1.0
  pointycastle: ^3.7.3
  hex: ^0.2.0
  path: ^1.8.3
  convert: ^3.1.1
  glob: ^2.1.2

  # WebDAV Dependencies
  shelf: ^1.4.0
  shelf_router: ^1.1.0 # Good for adding other handlers
  shelf_dav: ^1.0.0  # The server
  file: ^7.0.0       # The virtual filesystem interface
  ffi: ^2.2.0
  cryptography: ^2.9.0

dev_dependencies:
  lints: ^2.1.0
  test: ^1.24.0
  coverage: ^1.6.0